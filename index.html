	<!--===============================================================================================-->
	<style>
		#moneda-cup.active, #moneda-usd.active,
		#moneda-cup-movil.active, #moneda-usd-movil.active {
			background-color: #717fe0 !important;
			color: #fff !important;
			border-radius: 4px;
		}
		#moneda-cup:hover, #moneda-usd:hover,
		#moneda-cup-movil:hover, #moneda-usd-movil:hover {
			background-color: rgba(113, 127, 224, 0.1);
			border-radius: 4px;
		}
		.currency-selector {
			display: flex;
			align-items: center;
			margin-right: 15px;
		}
		.currency-selector a {
			color: #333;
			font-weight: bold;
			padding: 5px 10px;
			border-radius: 4px;
			transition: all 0.3s;
			text-decoration: none;
		}
		.currency-selector span {
			color: #ccc;
			margin: 0 5px;
		}
	</style>
</head>
<body class="animsition">

	<!-- ===== HEADER ===== -->
	<header role="banner" aria-label="Encabezado principal" class="header-v4">
		<div class="container-menu-desktop">
			<!-- Topbar -->
			<div class="top-bar">
				<div class="content-topbar flex-sb-m h-full container">
					<div class="left-top-bar headnotification" aria-live="polite">
						Transporte disponible y flexibilidad en la forma de pago.
					</div>
					<div class="right-top-bar flex-w h-full"></div>
				</div>
			</div>

			<div class="wrap-menu-desktop how-shadow1">
				<nav role="navigation" aria-label="Menú principal" class="limiter-menu-desktop container">
					<!-- Logo desktop -->
					<a href="./" aria-label="Ir a la página de inicio">
						<p style="margin-right: 25px; font-size: 23px;">
							<span class="storet1" style="color: #333; font-weight: bold;">MI</span>
							<span class="storet2" style="color: #666;">CATALOGO</span>
						</p>
					</a>

					<!-- Menu desktop -->
					<div class="menu-desktop">
						<ul class="main-menu" role="menubar">
							<li role="none" class="currency-selector">
								<a href="#" role="menuitem" id="moneda-cup" onclick="setMonedaPreferida('CUP')" aria-label="Cambiar a moneda CUP">CUP</a>
								<span aria-hidden="true">|</span>
								<a href="#" role="menuitem" id="moneda-usd" onclick="setMonedaPreferida('USD')" aria-label="Cambiar a moneda USD">USD</a>
							</li>
							<li role="none">
								<a href="contact.html" role="menuitem">Contacto</a>
							</li>
						</ul>
					</div>

					<!-- Icon header -->
					<div class="wrap-icon-header flex-w flex-r-m">
						<div class="icon-header-item cl2 hov-cl1 trans-04 p-l-22 p-r-11 icon-header-noti js-show-cart" 
						     data-notify="0" role="button" tabindex="0" 
						     aria-label="Carrito de compras" aria-live="polite">
							<i class="zmdi zmdi-shopping-cart" aria-hidden="true"></i>
						</div>
					</div>
				</nav>
			</div>
		</div>

		<!-- Header Mobile -->
		<div class="wrap-header-mobile">
			<div class="logo-mobile">
				<a href="./" aria-label="Ir a la página de inicio">
					<p style="margin-right: 25px; font-size: 23px;">
						<span class="storet1" style="color: #333; font-weight: bold;">MI</span>
						<span class="storet2" style="color: #666;">CATALOGO</span>
					</p>
				</a>
			</div>
			<div class="wrap-icon-header flex-w flex-r-m m-r-15">
				<div class="icon-header-item cl2 hov-cl1 trans-04 p-r-11 p-l-10 icon-header-noti js-show-cart" 
				     data-notify="2" role="button" tabindex="0" 
				     aria-label="Carrito de compras" aria-live="polite">
					<i class="zmdi zmdi-shopping-cart" aria-hidden="true"></i>
				</div>
			</div>
			<div class="btn-show-menu-mobile hamburger hamburger--squeeze" 
			     role="button" tabindex="0" aria-label="Abrir menú móvil">
				<span class="hamburger-box">
					<span class="hamburger-inner"></span>
				</span>
			</div>
		</div>

		<!-- Menu Mobile -->
		<div class="menu-mobile" role="navigation" aria-label="Menú móvil">
			<ul class="topbar-mobile">
				<li>
					<div class="left-top-bar headnotification" aria-live="polite">
						Transporte disponible y flexibilidad en la forma de pago.
					</div>
				</li>
				<li>
					<div class="right-top-bar flex-w h-full">
						<a href="#" class="flex-c-m p-lr-10 trans-04" id="moneda-cup-movil" onclick="setMonedaPreferida('CUP')" aria-label="Cambiar a moneda CUP" style="color: #fff; font-weight: bold;">CUP</a>
						<span style="color: #888;" aria-hidden="true">|</span>
						<a href="#" class="flex-c-m p-lr-10 trans-04" id="moneda-usd-movil" onclick="setMonedaPreferida('USD')" aria-label="Cambiar a moneda USD" style="color: #fff; font-weight: bold;">USD</a>
					</div>
				</li>
			</ul>
			<ul class="main-menu-m" role="menubar">
				<li role="none">
					<a href="contact.html" role="menuitem">Contacto</a>
				</li>
			</ul>
		</div>

		<!-- Modal Search -->
		<div class="modal-search-header flex-c-m trans-04 js-hide-modal-search" role="dialog" aria-label="Búsqueda" aria-modal="true">
			<div class="container-search-header">
				<button class="flex-c-m btn-hide-modal-search trans-04 js-hide-modal-search" aria-label="Cerrar búsqueda">
					<img src="images/icons/icon-close2.png" alt="Cerrar" aria-hidden="true">
				</button>
				<form class="wrap-search-header flex-w p-l-15" action="./" role="search">
					<button class="flex-c-m trans-04" type="submit" aria-label="Buscar">
						<i class="zmdi zmdi-search" aria-hidden="true"></i>
					</button>
					<input class="plh3" type="text" name="search" placeholder="Buscar..." aria-label="Escribe tu búsqueda">
				</form>
			</div>
		</div>
	</header>

	<!-- ===== CART ===== -->
	<div class="header-cart-item-img" aria-hidden="true"></div>

	<!-- ===== MAIN CONTENT ===== -->
	<main role="main" aria-label="Contenido principal">
		<div class="bg0 m-t-23 p-b-140">
			<div class="container">
				<div class="flex-w flex-sb-m p-b-52">
					<div class="flex-w flex-l-m filter-tope-group m-tb-10" role="group" aria-label="Filtros de categoría"></div>

					<div class="flex-w flex-c-m m-tb-10">
						<button class="flex-c-m stext-106 cl6 size-104 bor4 pointer hov-btn3 trans-04 m-r-8 m-tb-4 js-show-filter" aria-label="Filtrar productos">
							<i class="icon-filter cl2 m-r-6 fs-15 trans-04 zmdi zmdi-filter-list" aria-hidden="true"></i>
							<i class="icon-close-filter cl2 m-r-6 fs-15 trans-04 zmdi zmdi-close dis-none" aria-hidden="true"></i>
							Filtrar
						</button>
						<button class="flex-c-m stext-106 cl6 size-105 bor4 pointer hov-btn3 trans-04 m-tb-4 js-show-search" aria-label="Buscar productos">
							<i class="icon-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-search" aria-hidden="true"></i>
							<i class="icon-close-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-close dis-none" aria-hidden="true"></i>
							Buscar
						</button>
					</div>

					<!-- Search product -->
					<div class="dis-none panel-search w-full p-t-10 p-b-15" role="search">
						<div class="bor8 dis-flex p-l-15">
							<button class="size-113 flex-c-m fs-16 cl2 hov-cl1 trans-04" aria-label="Buscar">
								<i class="zmdi zmdi-search" aria-hidden="true"></i>
							</button>
							<input class="mtext-107 cl2 size-114 plh2 p-r-15" type="text" name="search-product" placeholder="Buscar" aria-label="Buscar productos">
						</div>
					</div>

					<!-- Filter -->
					<div class="dis-none panel-filter w-full p-t-10">
						<div class="wrap-filter flex-w bg6 w-full p-lr-40 p-t-27 p-lr-15-sm" role="group" aria-label="Filtros avanzados"></div>
					</div>
				</div>

				<div class="row isotope-grid" role="list" aria-label="Lista de productos"></div>
			</div>
		</div>
	</main>

	<!-- ===== FOOTER ===== -->
	<footer role="contentinfo" aria-label="Pie de página" class="bg3 p-t-50 p-b-32">
		<div class="container">
			<div class="p-t-20">
				<div class="flex-c-m flex-w p-b-30 foot txt-center"></div>
				<p class="txt-center">
					<a class="stext-107 cl1 txt-center" href="contact.html">Contacto</a>
				</p>
				<p class="stext-107 cl6 txt-center" aria-live="polite">
					Copyright &copy; <script>document.write(new Date().getFullYear());</script> Todos los derechos reservados
				</p>
			</div>
			
			<!-- ===== CÓDIGO QR ===== -->
			<div class="qr-container">
				<div style="text-align: center;">
					<span class="qr-label">📱 Escanea para visitar la tienda</span><br>
					<img src="/MERCADO/images/qr/qr-tienda.png" 
					     alt="Código QR para acceder a MERCADO" 
					     class="qr-code"
					     onclick="window.open('/MERCADO/images/qr/qr-tienda.png', '_blank')">
				</div>
			</div>
		</div>
	</footer>

	<!-- ===== BACK TO TOP ===== -->
	<div class="btn-back-to-top" id="myBtn" role="button" tabindex="0" aria-label="Volver arriba">
		<span class="symbol-btn-back-to-top">
			<i class="zmdi zmdi-chevron-up" aria-hidden="true"></i>
		</span>
	</div>

	<script src="vendor/parallax100/parallax100.js"></script>

	<script src="vendor/isotope/isotope.pkgd.min.js"></script>
	<script src="vendor/isotope/imagesloaded.pkgd.min.js"></script>
	<script src="vendor/sweetalert/sweetalert.min.js"></script>
	<script src="vendor/perfect-scrollbar/perfect-scrollbar.min.js"></script>
	<script src="js/lazyload.min.js"></script>
	<script src="js/utils.js"></script>
	<script src="js/index.js"></script>

	<script>
		(function() {
			var moneda = getMonedaPreferida();
			if (moneda === 'CUP') {
				document.getElementById('moneda-cup').classList.add('active');
				var movilCup = document.getElementById('moneda-cup-movil');
				if (movilCup) movilCup.classList.add('active');
			} else {
				document.getElementById('moneda-usd').classList.add('active');
				var movilUsd = document.getElementById('moneda-usd-movil');
				if (movilUsd) movilUsd.classList.add('active');
			}
		})();
	</script>
</body>
