<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-container h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .login-container .subtitle {
            color: rgba(255,255,255,0.6);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .login-container .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-container .logo i {
            font-size: 60px;
            color: #6c7ae0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #6c7ae0;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(108, 122, 224, 0.2);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6c7ae0, #5a67d8);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 122, 224, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
        .footer-text {
            color: rgba(255,255,255,0.3);
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-film"></i>
        </div>
        <h1>Panel de Administración</h1>
        <p class="subtitle">Gestiona tu catálogo audiovisual</p>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Acceder
            </button>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos
            </div>
        </form>
        <p class="footer-text">© 2024 CINEMARKET - Todos los derechos reservados</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // Cargar usuarios desde el archivo JSON
            fetch('../data/admin-users.json')
                .then(response => response.json())
                .then(users => {
                    if (users[username] && users[username].password === password) {
                        // Guardar sesión
                        localStorage.setItem('adminUser', JSON.stringify({
                            username: username,
                            name: users[username].name
                        }));
                        window.location.href = 'index.html';
                    } else {
                        errorMsg.style.display = 'block';
                        setTimeout(() => {
                            errorMsg.style.display = 'none';
                        }, 3000);
                    }
                })
                .catch(() => {
                    errorMsg.textContent = 'Error al cargar usuarios. Intenta de nuevo.';
                    errorMsg.style.display = 'block';
                });
        });

        // Verificar si ya está logueado
        const adminUser = localStorage.getItem('adminUser');
        if (adminUser) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
