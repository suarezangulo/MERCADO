# ===== netlify.toml =====
# Configuración para desplegar MERCADO en Netlify

[build]
  publish = "."

# ===== REDIRECCIONES =====
# Asegura que el CMS (admin) funcione correctamente
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# ===== ENCABEZADOS =====
# Mejora el rendimiento con caché para archivos estáticos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ===== PLUGINS =====
# Decap CMS necesita autenticación con Netlify Identity
[[plugins]]
  package = "@netlify/plugin-git-gateway"
