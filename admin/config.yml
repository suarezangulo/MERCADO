backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

locale: 'es'

collections:
  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    description: "Gestiona todos los productos de la tienda"
    folder: "data/products"
    create: true
    slug: "{{slug}}"
    format: json
    fields:
      - label: "Categoría"
        name: "Category"
        widget: "string"          # <--- Ahora es texto libre
        default: "Productos"
        hint: "Escribe la categoría (ej: Productos, Alimentos, Electrodomésticos)"

      - label: "Subcategoría"
        name: "SubCategory"
        widget: "string"          # <--- Ahora es texto libre
        default: "Confituras"
        hint: "Escribe la subcategoría (ej: Confituras, Granos, Televisores)"

      - label: "Nombre del producto"
        name: "Label"
        widget: "string"
        required: true
        hint: "Ej: Mermelada de Guayaba (460 g)"

      - label: "Descripción"
        name: "Description"
        widget: "text"
        required: true
        hint: "Descripción detallada del producto. Usa saltos de línea para separar secciones."

      - label: "Precio"
        name: "Price"
        widget: "string"
        required: true
        hint: "Ej: 850.00 CUP o 85.97 USD"
        pattern:
          - '^\d+\.?\d* (CUP|USD)$'
          - "Formato: número + espacio + CUP o USD"

      - label: "Stock"
        name: "Stock"
        widget: "number"
        default: 0
        min: 0
        hint: "Cantidad disponible en inventario"

      - label: "Imágenes"
        name: "Images"
        widget: "list"
        required: true
        min: 1
        hint: "Agrega al menos una imagen del producto"
        field:
          label: "Imagen"
          name: "image"
          widget: "image"
          media_folder: "/images/products"
          public_folder: "/images/products"

      - label: "Características"
        name: "Features"
        widget: "list"
        required: false
        hint: "Lista de características o items del combo"
        field:
          label: "Característica"
          name: "feature"
          widget: "string"

      - label: "Fecha de creación"
        name: "Date"
        widget: "datetime"
        default: ""
        date_format: "YYYY-MM-DDTHH:mm:ssZ"
        time_format: false

      - label: "Última actualización"
        name: "Update"
        widget: "datetime"
        default: ""
        date_format: "YYYY-MM-DDTHH:mm:ssZ"
        time_format: false
