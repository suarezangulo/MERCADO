<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración - MERCADO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #717fe0;
            --primary-dark: #5a67c9;
            --primary-light: #8b97e8;
            --primary-bg: #f0f2ff;
            --success: #28a745;
            --success-bg: #d4edda;
            --danger: #dc3545;
            --danger-bg: #f8d7da;
            --warning: #ffc107;
            --warning-bg: #fff3cd;
            --bg: #f5f7fc;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --border: #e2e8f0;
            --shadow: 0 10px 40px rgba(113, 127, 224, 0.15);
            --shadow-hover: 0 15px 50px rgba(113, 127, 224, 0.25);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== PANEL PRINCIPAL ===== */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow-y: auto;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .admin-panel.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .admin-panel-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 1400px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            padding: 35px 40px;
            box-shadow: var(--shadow);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SCROLLBAR PERSONALIZADO ===== */
        .admin-panel-content::-webkit-scrollbar {
            width: 8px;
        }
        .admin-panel-content::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 10px;
        }
        .admin-panel-content::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .admin-panel-content::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* ===== BOTÓN CERRAR ===== */
        .admin-panel-close {
            position: sticky;
            top: 0;
            float: right;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .admin-panel-close:hover {
            background: #c82333;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }

        /* ===== HEADER DEL PANEL ===== */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            padding-right: 60px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-header-left .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-bg);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
        }

        .admin-header-left h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .admin-header-left h2 span {
            color: var(--primary);
        }

        .admin-header-left .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            margin-top: -2px;
        }

        /* ===== ESTADÍSTICAS RÁPIDAS ===== */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(113, 127, 224, 0.1);
        }

        .stat-card .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ===== ACCIONES ===== */
        .admin-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .admin-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add {
            background: var(--success);
            color: #fff;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-add:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }

        .btn-refresh {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(113, 127, 224, 0.3);
        }
        .btn-refresh:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(113, 127, 224, 0.4);
        }

        .btn-export {
            background: #17a2b8;
            color: #fff;
            box-shadow: 0 4px 15px rgba(23, 162, 184, 0.3);
        }
        .btn-export:hover {
            background: #138496;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 162, 184, 0.4);
        }

        /* ===== TABLA ===== */
        .admin-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font);
            font-size: 14px;
        }

        .admin-table thead {
            background: var(--bg);
        }

        .admin-table th {
            font-weight: 600;
            color: var(--text-secondary);
            text-align: left;
            padding: 14px 18px;
            border-bottom: 2px solid var(--border);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 2;
            background: var(--bg);
        }

        .admin-table td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-secondary);
        }

        .admin-table tbody tr {
            transition: var(--transition);
        }

        .admin-table tbody tr:hover {
            background: var(--primary-bg);
        }

        .admin-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ===== IMAGEN EN TABLA ===== */
        .admin-table .product-img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            background: var(--bg);
            border: 2px solid var(--border);
            transition: var(--transition);
        }

        .admin-table .product-img:hover {
            transform: scale(1.5);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(113, 127, 224, 0.3);
            z-index: 5;
            position: relative;
        }

        .admin-table .product-name {
            font-weight: 600;
            color: var(--text);
        }

        .admin-table .product-price {
            color: var(--primary);
            font-weight: 700;
        }

        /* ===== STOCK ===== */
        .admin-table .product-stock {
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
        }

        .admin-table .product-stock.low {
            color: #721c24;
            background: var(--danger-bg);
        }

        .admin-table .product-stock.medium {
            color: #856404;
            background: var(--warning-bg);
        }

        .admin-table .product-stock.high {
            color: #155724;
            background: var(--success-bg);
        }

        /* ===== ACCIONES EN FILA ===== */
        .admin-table .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .admin-table .actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .admin-table .actions .btn-edit {
            background: var(--primary);
            color: #fff;
        }

        .admin-table .actions .btn-edit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(113, 127, 224, 0.3);
        }

        .admin-table .actions .btn-delete {
            background: var(--danger);
            color: #fff;
        }

        .admin-table .actions .btn-delete:hover {
            background: #c82333;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        /* ===== LOADING ===== */
        .admin-loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .admin-loading.active {
            display: block;
        }

        .admin-loading .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-loading p {
            margin-top: 16px;
            font-size: 15px;
            font-weight: 500;
        }

        /* ===== FORMULARIO DE EDICIÓN ===== */
        .admin-form {
            display: none;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 28px 30px;
            margin-top: 25px;
            border: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }

        .admin-form.active {
            display: block;
        }

        .admin-form h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-form h3 i {
            color: var(--primary);
        }

        .admin-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .admin-form .form-group {
            margin-bottom: 16px;
        }

        .admin-form .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .admin-form .form-group label .required {
            color: var(--danger);
            margin-left: 2px;
        }

        .admin-form .form-group input,
        .admin-form .form-group textarea,
        .admin-form .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text);
        }

        .admin-form .form-group input:focus,
        .admin-form .form-group textarea:focus,
        .admin-form .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(113, 127, 224, 0.15);
        }

        .admin-form .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .admin-form .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .admin-form .form-actions button {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
        }

        .admin-form .form-actions .btn-save {
            background: var(--success);
            color: #fff;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .admin-form .form-actions .btn-save:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }

        .admin-form .form-actions .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .admin-form .form-actions .btn-cancel {
            background: var(--border);
            color: var(--text-secondary);
        }

        .admin-form .form-actions .btn-cancel:hover {
            background: #d1d5db;
        }

        /* ===== ESTADO VACÍO ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 56px;
            color: var(--border);
            margin-bottom: 16px;
            display: block;
        }

        .empty-state h4 {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .admin-panel-content {
                padding: 25px 20px;
                max-height: 98vh;
            }

            .admin-header-left h2 {
                font-size: 22px;
            }

            .admin-form .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .admin-panel {
                padding: 10px;
            }

            .admin-panel-content {
                padding: 20px 15px;
                border-radius: var(--radius-sm);
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                padding-right: 0;
            }

            .admin-header-left h2 {
                font-size: 20px;
            }

            .admin-header-left .subtitle {
                font-size: 13px;
            }

            .admin-panel-close {
                width: 38px;
                height: 38px;
                font-size: 16px;
                position: absolute;
                top: 12px;
                right: 12px;
                float: none;
            }

            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .admin-table {
                font-size: 13px;
            }

            .admin-table th,
            .admin-table td {
                padding: 10px 12px;
            }

            .admin-table .product-img {
                width: 40px;
                height: 40px;
            }

            .admin-table .product-img:hover {
                transform: scale(2);
            }

            .admin-table .actions {
                flex-direction: column;
                gap: 5px;
            }

            .admin-table .actions button {
                width: 100%;
                justify-content: center;
            }

            .admin-form {
                padding: 18px 16px;
            }

            .admin-form h3 {
                font-size: 18px;
            }

            .admin-form .form-actions {
                flex-direction: column;
            }

            .admin-form .form-actions button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .admin-panel-content {
                padding: 15px 12px;
            }

            .admin-header-left h2 {
                font-size: 18px;
            }

            .admin-stats {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .stat-card .stat-number {
                font-size: 22px;
            }

            .admin-actions button {
                padding: 10px 16px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ===== PANEL DE ADMINISTRACIÓN ===== -->
    <div id="admin-panel" class="admin-panel" role="dialog" aria-modal="true" aria-label="Panel de administración">
        <div class="admin-panel-content">
            
            <!-- Botón cerrar -->
            <button class="admin-panel-close" onclick="closeAdminPanel()" aria-label="Cerrar panel">
                <i class="fas fa-times"></i>
            </button>

            <!-- Header -->
            <div class="admin-header">
                <div class="admin-header-left">
                    <div class="logo-icon">
                        <i class="fas fa-store-alt"></i>
                    </div>
                    <div>
                        <h2><span>Panel</span> de Administración</h2>
                        <span class="subtitle">Gestiona tu tienda MERCADO</span>
                    </div>
                </div>
            </div>

            <!-- Estadísticas -->
            <div class="admin-stats" id="admin-stats">
                <div class="stat-card">
                    <span class="stat-number" id="stat-total">0</span>
                    <span class="stat-label">Total productos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-low">0</span>
                    <span class="stat-label">Stock bajo</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-out">0</span>
                    <span class="stat-label">Agotados</span>
                </div>
            </div>

            <!-- Acciones -->
            <div class="admin-actions">
                <button class="btn-add" onclick="openNewProductForm()">
                    <i class="fas fa-plus-circle"></i> Nuevo Producto
                </button>
                <button class="btn-refresh" onclick="loadAdminProducts()">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
                <button class="btn-export" onclick="exportProducts()">
                    <i class="fas fa-file-export"></i> Exportar CSV
                </button>
            </div>

            <!-- Loading -->
            <div id="admin-loading" class="admin-loading">
                <div class="spinner"></div>
                <p>Cargando productos...</p>
            </div>

            <!-- Tabla -->
            <div class="admin-table-wrap">
                <table class="admin-table" role="table" aria-label="Lista de productos">
                    <thead role="rowgroup">
                        <tr role="row">
                            <th role="columnheader">Imagen</th>
                            <th role="columnheader">Producto</th>
                            <th role="columnheader">Precio</th>
                            <th role="columnheader">Stock</th>
                            <th role="columnheader">Subcategoría</th>
                            <th role="columnheader">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" role="rowgroup">
                        <!-- Los productos se cargan dinámicamente -->
                    </tbody>
                </table>
            </div>

            <!-- Formulario de edición -->
            <div id="admin-form" class="admin-form">
                <h3><i class="fas fa-edit"></i> <span id="admin-form-title">Editar Producto</span></h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-category">Categoría <span class="required">*</span></label>
                        <select id="edit-category">
                            <option value="Productos">Productos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-subcategory">Subcategoría <span class="required">*</span></label>
                        <select id="edit-subcategory">
                            <option value="Confituras">Confituras</option>
                            <option value="Combos">Combos</option>
                            <option value="Bebidas">Bebidas</option>
                            <option value="Cuidado Personal">Cuidado Personal</option>
                            <option value="Hogar">Hogar</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-label">Nombre del producto <span class="required">*</span></label>
                    <input type="text" id="edit-label" placeholder="Ej: Mermelada de Guayaba (460 g)">
                </div>

                <div class="form-group">
                    <label for="edit-description">Descripción</label>
                    <textarea id="edit-description" placeholder="Descripción detallada del producto..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-price">Precio <span class="required">*</span></label>
                        <input type="text" id="edit-price" placeholder="Ej: 850.00 CUP">
                    </div>
                    <div class="form-group">
                        <label for="edit-stock">Stock</label>
                        <input type="number" id="edit-stock" min="0" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-features">Características (una por línea)</label>
                    <textarea id="edit-features" placeholder="Ej:&#10;Clásicas galletas María&#10;Textura crujiente"></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn-save" onclick="saveProduct()">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <button class="btn-cancel" onclick="closeForm()">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ===== JQUERY (NECESARIO) ===== -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- ===== ADMIN.JS (RUTA CORREGIDA) ===== -->
    <script src="../js/admin.js"></script>
</body>
</html>
