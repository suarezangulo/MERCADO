<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración - MERCADO</title>
    <style>
        :root {
            --primary: #717fe0;
            --primary-dark: #5a67c9;
            --bg: #ffffff;
            --text: #333333;
            --font: 'Poppins', sans-serif;
        }
        body {
            background-color: var(--bg) !important;
            font-family: var(--font) !important;
            color: var(--text) !important;
        }
        .nc-entry-editor .nc-editor-toolbar {
            background: var(--bg) !important;
            border-bottom: 1px solid #e6e6e6 !important;
        }
        .nc-entry-editor .nc-editor-toolbar button {
            color: var(--text) !important;
        }
        .nc-entry-editor .nc-editor-toolbar button.active {
            background: var(--primary) !important;
            color: #fff !important;
        }
        .nc-entry-editor .nc-editor-content {
            background: var(--bg) !important;
        }
        .nc-entry-editor .nc-widget-control {
            background: var(--bg) !important;
        }
        .nc-entry-editor .nc-widget {
            font-family: var(--font) !important;
        }
        .nc-app-header .nc-app-header-logo {
            font-weight: 600 !important;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        CMS.registerPreviewStyle('/css/util.css');
        CMS.registerPreviewStyle('/css/main.css');
    </script>
</body>
</html>
