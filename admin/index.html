<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración - MERCADO</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ===== TODOS LOS ESTILOS (sin cambios) ===== */
        :root { --primary: #717fe0; --primary-dark: #5a67c9; --primary-light: #8b97e8; --primary-bg: #f0f2ff; --success: #28a745; --success-bg: #d4edda; --danger: #dc3545; --danger-bg: #f8d7da; --warning: #ffc107; --warning-bg: #fff3cd; --bg: #f5f7fc; --card-bg: #ffffff; --text: #1a1a2e; --text-secondary: #4a4a6a; --text-muted: #8888aa; --border: #e2e8f0; --shadow: 0 10px 40px rgba(113, 127, 224, 0.15); --shadow-hover: 0 15px 50px rgba(113, 127, 224, 0.25); --radius: 16px; --radius-sm: 10px; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(26, 26, 46, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); overflow-y: auto; padding: 20px; animation: fadeIn 0.3s ease; }
        .admin-panel.active { display: flex; align-items: flex-start; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .admin-panel-content { background: var(--card-bg); border-radius: var(--radius); max-width: 1400px; width: 100%; max-height: 95vh; overflow-y: auto; padding: 35px 40px; box-shadow: var(--shadow); position: relative; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .admin-panel-content::-webkit-scrollbar { width: 8px; }
        .admin-panel-content::-webkit-scrollbar-track { background: var(--bg); border-radius: 10px; }
        .admin-panel-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .admin-panel-content::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }
        .admin-panel-close { position: sticky; top: 0; float: right; background: var(--danger); color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; transition: var(--transition); z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3); }
        .admin-panel-close:hover { background: #c82333; transform: scale(1.1) rotate(90deg); box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4); }
        .admin-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; padding-right: 60px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        .admin-header-left { display: flex; align-items: center; gap: 15px; }
        .admin-header-left .logo-icon { width: 48px; height: 48px; background: var(--primary-bg); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--primary); }
        .admin-header-left h2 { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
        .admin-header-left h2 span { color: var(--primary); }
        .admin-header-left .subtitle { font-size: 14px; color: var(--text-muted); font-weight: 400; display: block; margin-top: -2px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--bg); border-radius: var(--radius-sm); padding: 16px 20px; text-align: center; transition: var(--transition); border: 1px solid transparent; }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(113, 127, 224, 0.1); }
        .stat-card .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); display: block; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .admin-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .admin-actions button { padding: 12px 24px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; }
        .btn-add { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .btn-add:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4); }
        .btn-refresh { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(113, 127, 224, 0.3); }
        .btn-refresh:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(113, 127, 224, 0.4); }
        .btn-export { background: #17a2b8; color: #fff; box-shadow: 0 4px 15px rgba(23, 162, 184, 0.3); }
        .btn-export:hover { background: #138496; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(23, 162, 184, 0.4); }
        .admin-table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .admin-table { width: 100%; border-collapse: collapse; font-family: var(--font); font-size: 14px; }
        .admin-table thead { background: var(--bg); }
        .admin-table th { font-weight: 600; color: var(--text-secondary); text-align: left; padding: 14px 18px; border-bottom: 2px solid var(--border); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; background: var(--bg); }
        .admin-table td { padding: 14px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text-secondary); }
        .admin-table tbody tr { transition: var(--transition); }
        .admin-table tbody tr:hover { background: var(--primary-bg); }
        .admin-table tbody tr:last-child td { border-bottom: none; }
        .admin-table .product-img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius-sm); background: var(--bg); border: 2px solid var(--border); transition: var(--transition); }
        .admin-table .product-img:hover { transform: scale(1.5); border-color: var(--primary); box-shadow: 0 4px 15px rgba(113, 127, 224, 0.3); z-index: 5; position: relative; }
        .admin-table .product-name { font-weight: 600; color: var(--text); }
        .admin-table .product-price { color: var(--primary); font-weight: 700; }
        .admin-table .product-stock { font-weight: 600; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 13px; }
        .admin-table .product-stock.low { color: #721c24; background: var(--danger-bg); }
        .admin-table .product-stock.medium { color: #856404; background: var(--warning-bg); }
        .admin-table .product-stock.high { color: #155724; background: var(--success-bg); }
        .admin-table .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-table .actions button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 5px; }
        .admin-table .actions .btn-edit { background: var(--primary); color: #fff; }
        .admin-table .actions .btn-edit:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(113, 127, 224, 0.3); }
        .admin-table .actions .btn-delete { background: var(--danger); color: #fff; }
        .admin-table .actions .btn-delete:hover { background: #c82333; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3); }
        .admin-loading { display: none; text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .admin-loading.active { display: block; }
        .admin-loading .spinner { display: inline-block; width: 50px; height: 50px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .admin-loading p { margin-top: 16px; font-size: 15px; font-weight: 500; }
        .admin-form { display: none; background: var(--bg); border-radius: var(--radius-sm); padding: 28px 30px; margin-top: 25px; border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        .admin-form.active { display: block; }
        .admin-form h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .admin-form h3 i { color: var(--primary); }
        .admin-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .admin-form .form-group { margin-bottom: 16px; }
        .admin-form .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
        .admin-form .form-group label .required { color: var(--danger); margin-left: 2px; }
        .admin-form .form-group input, .admin-form .form-group textarea, .admin-form .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 14px; transition: var(--transition); background: var(--card-bg); color: var(--text); }
        .admin-form .form-group input:focus, .admin-form .form-group textarea:focus, .admin-form .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(113, 127, 224, 0.15); }
        .admin-form .form-group textarea { min-height: 120px; resize: vertical; }
        .admin-form .form-actions { display: flex; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .admin-form .form-actions button { padding: 12px 32px; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 600; transition: var(--transition); }
        .admin-form .form-actions .btn-save { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .admin-form .form-actions .btn-save:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4); }
        .admin-form .form-actions .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .admin-form .form-actions .btn-cancel { background: var(--border); color: var(--text-secondary); }
        .admin-form .form-actions .btn-cancel:hover { background: #d1d5db; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 56px; color: var(--border); margin-bottom: 16px; display: block; }
        .empty-state h4 { font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 15px; }
        @media (max-width: 992px) { .admin-panel-content { padding: 25px 20px; max-height: 98vh; } .admin-header-left h2 { font-size: 22px; } .admin-form .form-row { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .admin-panel { padding: 10px; } .admin-panel-content { padding: 20px 15px; border-radius: var(--radius-sm); } .admin-header { flex-direction: column; align-items: flex-start; padding-right: 0; } .admin-header-left h2 { font-size: 20px; } .admin-header-left .subtitle { font-size: 13px; } .admin-panel-close { width: 38px; height: 38px; font-size: 16px; position: absolute; top: 12px; right: 12px; float: none; } .admin-stats { grid-template-columns: repeat(2, 1fr); } .admin-table { font-size: 13px; } .admin-table th, .admin-table td { padding: 10px 12px; } .admin-table .product-img { width: 40px; height: 40px; } .admin-table .product-img:hover { transform: scale(2); } .admin-table .actions { flex-direction: column; gap: 5px; } .admin-table .actions button { width: 100%; justify-content: center; } .admin-form { padding: 18px 16px; } .admin-form h3 { font-size: 18px; } .admin-form .form-actions { flex-direction: column; } .admin-form .form-actions button { width: 100%; justify-content: center; } }
        @media (max-width: 480px) { .admin-panel-content { padding: 15px 12px; } .admin-header-left h2 { font-size: 18px; } .admin-stats { grid-template-columns: 1fr 1fr; gap: 10px; } .stat-card .stat-number { font-size: 22px; } .admin-actions button { padding: 10px 16px; font-size: 13px; flex: 1; justify-content: center; } }

        /* ===== MODAL PERSONALIZADO ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 420px;
            width: 90%;
            padding: 30px 30px 20px;
            box-shadow: var(--shadow-hover);
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        .modal-box .modal-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .modal-box h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-actions button {
            padding: 12px 32px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            min-width: 100px;
        }
        .modal-actions .btn-yes {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        .modal-actions .btn-yes:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        .modal-actions .btn-no {
            background: var(--border);
            color: var(--text-secondary);
        }
        .modal-actions .btn-no:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- ===== PANEL DE ADMINISTRACIÓN ===== -->
    <div id="admin-panel" class="admin-panel" role="dialog" aria-modal="true" aria-label="Panel de administración">
        <div class="admin-panel-content">
            <button class="admin-panel-close" onclick="showCloseModal()" aria-label="Cerrar panel">
                <i class="fas fa-times"></i>
            </button>

            <div class="admin-header">
                <div class="admin-header-left">
                    <div class="logo-icon"><i class="fas fa-store-alt"></i></div>
                    <div>
                        <h2><span>Panel</span> de Administración</h2>
                        <span class="subtitle">Gestiona tu tienda MERCADO</span>
                    </div>
                </div>
            </div>

            <div class="admin-stats" id="admin-stats">
                <div class="stat-card"><span class="stat-number" id="stat-total">0</span><span class="stat-label">Total productos</span></div>
                <div class="stat-card"><span class="stat-number" id="stat-low">0</span><span class="stat-label">Stock bajo</span></div>
                <div class="stat-card"><span class="stat-number" id="stat-out">0</span><span class="stat-label">Agotados</span></div>
            </div>

            <div class="admin-actions">
                <button class="btn-add" onclick="openNewProductForm()"><i class="fas fa-plus-circle"></i> Nuevo Producto</button>
                <button class="btn-refresh" onclick="loadAdminProducts()"><i class="fas fa-sync-alt"></i> Recargar</button>
                <button class="btn-export" onclick="exportProducts()"><i class="fas fa-file-export"></i> Exportar CSV</button>
            </div>

            <div id="admin-loading" class="admin-loading">
                <div class="spinner"></div>
                <p>Cargando productos...</p>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" role="table" aria-label="Lista de productos">
                    <thead><tr><th>Imagen</th><th>Producto</th><th>Precio</th><th>Stock</th><th>Subcategoría</th><th>Acciones</th></tr></thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>

            <!-- ===== FORMULARIO DE EDICIÓN MODIFICADO (CAMPOS DE TEXTO) ===== -->
            <div id="admin-form" class="admin-form">
                <h3><i class="fas fa-edit"></i> <span id="admin-form-title">Editar Producto</span></h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-category">Categoría <span class="required">*</span></label>
                        <input type="text" id="edit-category" placeholder="Ej: Productos, Alimentos, Electrodomésticos..." value="Productos">
                    </div>
                    <div class="form-group">
                        <label for="edit-subcategory">Subcategoría <span class="required">*</span></label>
                        <input type="text" id="edit-subcategory" placeholder="Ej: Confituras, Granos, Televisores..." value="Confituras">
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-label">Nombre del producto <span class="required">*</span></label>
                    <input type="text" id="edit-label" placeholder="Ej: Mermelada de Guayaba (460 g)">
                </div>

                <div class="form-group">
                    <label for="edit-description">Descripción</label>
                    <textarea id="edit-description" placeholder="Descripción detallada del producto..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-price">Precio <span class="required">*</span></label>
                        <input type="text" id="edit-price" placeholder="Ej: 850.00 CUP">
                    </div>
                    <div class="form-group">
                        <label for="edit-stock">Stock</label>
                        <input type="number" id="edit-stock" min="0" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-features">Características (una por línea)</label>
                    <textarea id="edit-features" placeholder="Ej:&#10;Clásicas galletas María&#10;Textura crujiente"></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn-save" onclick="saveProduct()"><i class="fas fa-save"></i> Guardar</button>
                    <button class="btn-cancel" onclick="closeForm()"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODAL DE CONFIRMACIÓN ===== -->
    <div id="closeModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-sign-out-alt"></i></div>
            <h3>¿Cerrar sesión?</h3>
            <p>¿Deseas cerrar sesión y volver a la tienda, o solo salir del panel?</p>
            <div class="modal-actions">
                <button class="btn-yes" onclick="confirmClose(true)"><i class="fas fa-sign-out-alt"></i> Sí, cerrar sesión</button>
                <button class="btn-no" onclick="confirmClose(false)"><i class="fas fa-arrow-right"></i> No, solo salir</button>
            </div>
        </div>
    </div>

    <!-- ===== JQUERY ===== -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ===== ERUDA PARA DEPURACIÓN EN MÓVIL ===== -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init({ tool: ['console', 'network', 'elements'] });</script>

    <!-- ===== TODO EL CÓDIGO JAVASCRIPT ===== -->
    <script>
        // ===== VARIABLES GLOBALES =====
        let adminProducts = [];
        let editingProduct = null;
        let currentProductId = null;

        // ===== FUNCIÓN ToSlug LOCAL =====
        function ToSlug(str) {
            if (!str) return "";
            let s = str.toLowerCase();
            s = s.replace(/[^a-z0-9\s-]/g, "");
            s = s.replace(/ /g, "-");
            s = s.replace(/-+/g, "-");
            s = s.replace(/^-+/, "").replace(/-+$/, "");
            if (s.length > 50) s = s.substring(0, 50);
            return s;
        }

        // ===== CARGAR PRODUCTOS =====
        function loadAdminProducts() {
            showAdminLoading(true);
            console.log("🔍 Cargando products-index.json...");
            const url = "../data/products-index.json?t=" + new Date().getTime();
            console.log("📡 URL:", url);
            fetch(url, { cache: 'no-cache', headers: { 'Cache-Control': 'no-cache' } })
                .then(response => {
                    console.log("📡 Status:", response.status);
                    if (!response.ok) throw new Error("HTTP " + response.status);
                    return response.json();
                })
                .then(data => {
                    console.log("✅ Datos recibidos:", data);
                    adminProducts = [];
                    for (let category in data) {
                        for (let subcategory in data[category]) {
                            for (let product of data[category][subcategory]) {
                                product._category = category;
                                product._subcategory = subcategory;
                                adminProducts.push(product);
                            }
                        }
                    }
                    renderAdminTable();
                    updateStats();
                    showAdminLoading(false);
                })
                .catch(error => {
                    console.error("❌ Error:", error);
                    showAdminLoading(false);
                    alert("Error al cargar los productos. Revisa la consola (Eruda) para más detalles.");
                });
        }

        // ===== ACTUALIZAR ESTADÍSTICAS =====
        function updateStats() {
            const total = adminProducts.length;
            const low = adminProducts.filter(p => (p.Stock || 0) > 0 && (p.Stock || 0) < 10).length;
            const out = adminProducts.filter(p => (p.Stock || 0) === 0).length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-low').textContent = low;
            document.getElementById('stat-out').textContent = out;
        }

        // ===== RENDERIZAR TABLA =====
        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            if (!tbody) return;
            if (adminProducts.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-box-open"></i><h4>No hay productos</h4><p>Haz clic en "Nuevo Producto" para comenzar.</p></div></td></tr>`;
                return;
            }
            let html = '';
            adminProducts.forEach((product) => {
                const slug = ToSlug(product.Label);
                const stock = product.Stock || 0;
                const stockClass = stock === 0 ? 'low' : stock < 10 ? 'medium' : 'high';
                const stockText = stock === 0 ? 'Agotado' : stock;
                let imgSrc = product.Images && product.Images.length > 0 ? product.Images[0] : "./images/products/" + slug + "-0.webp";
                html += `<tr>
                    <td><img src="${imgSrc}" alt="${product.Label}" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2256%22 height=%2256%22/%3E'"></td>
                    <td class="product-name">${product.Label}</td>
                    <td class="product-price">${product.Price || '0.00 CUP'}</td>
                    <td><span class="product-stock ${stockClass}">${stockText}</span></td>
                    <td>${product.SubCategory || '-'}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" onclick="openEditForm('${slug}')"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn-delete" onclick="deleteProduct('${slug}')"><i class="fas fa-trash-alt"></i> Eliminar</button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ===== EXPORTAR CSV =====
        function exportProducts() {
            if (adminProducts.length === 0) { alert('No hay productos para exportar.'); return; }
            let csv = 'Producto,Subcategoría,Precio,Stock,Características\n';
            adminProducts.forEach(p => {
                const features = (p.Features || []).join('; ');
                csv += `"${p.Label}","${p.SubCategory || ''}","${p.Price || ''}",${p.Stock || 0},"${features}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'productos.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // ===== ABRIR FORMULARIO DE EDICIÓN =====
        function openEditForm(slug) {
            const product = adminProducts.find(p => ToSlug(p.Label) === slug);
            if (!product) return;
            currentProductId = slug;
            editingProduct = product;
            document.getElementById('edit-category').value = product._category || 'Productos';
            document.getElementById('edit-subcategory').value = product.SubCategory || 'Confituras';
            document.getElementById('edit-label').value = product.Label || '';
            document.getElementById('edit-description').value = product.Description || '';
            document.getElementById('edit-price').value = product.Price || '';
            document.getElementById('edit-stock').value = product.Stock || 0;
            document.getElementById('edit-features').value = (product.Features || []).join('\n');
            document.getElementById('admin-form').classList.add('active');
            document.getElementById('admin-form-title').textContent = '✏️ Editar Producto';
            document.getElementById('admin-form').scrollIntoView({ behavior: 'smooth' });
        }

        // ===== ABRIR FORMULARIO PARA NUEVO PRODUCTO =====
        function openNewProductForm() {
            currentProductId = null;
            editingProduct = null;
            document.getElementById('edit-category').value = 'Productos';
            document.getElementById('edit-subcategory').value = 'Confituras';
            document.getElementById('edit-label').value = '';
            document.getElementById('edit-description').value = '';
            document.getElementById('edit-price').value = '';
            document.getElementById('edit-stock').value = '0';
            document.getElementById('edit-features').value = '';
            document.getElementById('admin-form').classList.add('active');
            document.getElementById('admin-form-title').textContent = '➕ Nuevo Producto';
            document.getElementById('admin-form').scrollIntoView({ behavior: 'smooth' });
        }

        // ===== CERRAR FORMULARIO =====
        function closeForm() {
            document.getElementById('admin-form').classList.remove('active');
        }

        // ===== GUARDAR PRODUCTO =====
        function saveProduct() {
            const label = document.getElementById('edit-label').value.trim();
            if (!label) { alert('El nombre del producto es obligatorio.'); return; }
            const price = document.getElementById('edit-price').value.trim();
            if (!price || !/^\d+\.?\d* (CUP|USD)$/.test(price)) {
                alert('El precio debe tener el formato: número + espacio + CUP o USD (ej. 850.00 CUP)');
                return;
            }
            // ==== TOMAR CATEGORÍA Y SUBCATEGORÍA COMO TEXTO LIBRE ====
            const category = document.getElementById('edit-category').value.trim() || 'Productos';
            const subcategory = document.getElementById('edit-subcategory').value.trim() || 'Confituras';

            const productData = {
                Category: category,
                SubCategory: subcategory,
                Label: label,
                Description: document.getElementById('edit-description').value,
                Price: price,
                Stock: parseInt(document.getElementById('edit-stock').value) || 0,
                Features: document.getElementById('edit-features').value.split('\n').filter(f => f.trim() !== ''),
                Date: new Date().toISOString(),
                Update: new Date().toISOString(),
                Images: ['/images/products/' + ToSlug(label) + '-0.webp']
            };
            const btnSave = document.querySelector('.btn-save');
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            btnSave.disabled = true;
            setTimeout(() => {
                if (currentProductId) {
                    const index = adminProducts.findIndex(p => ToSlug(p.Label) === currentProductId);
                    if (index !== -1) {
                        adminProducts[index] = productData;
                        adminProducts[index]._category = productData.Category;
                        adminProducts[index]._subcategory = productData.SubCategory;
                    }
                } else {
                    productData._category = productData.Category;
                    productData._subcategory = productData.SubCategory;
                    adminProducts.push(productData);
                }
                renderAdminTable();
                updateStats();
                closeForm();
                btnSave.innerHTML = originalText;
                btnSave.disabled = false;
                alert(currentProductId ? '✅ Producto actualizado correctamente.' : '✅ Producto creado correctamente.');
            }, 1000);
        }

        // ===== ELIMINAR PRODUCTO =====
        function deleteProduct(slug) {
            if (!confirm(`¿Estás seguro de que quieres eliminar este producto?\nEsta acción no se puede deshacer.`)) return;
            const index = adminProducts.findIndex(p => ToSlug(p.Label) === slug);
            if (index === -1) return;
            adminProducts.splice(index, 1);
            renderAdminTable();
            updateStats();
            alert('🗑️ Producto eliminado correctamente.');
        }

        // ===== MOSTRAR/OCULTAR LOADING =====
        function showAdminLoading(show) {
            const loading = document.getElementById('admin-loading');
            if (loading) loading.classList.toggle('active', show);
        }

        // ===== MOSTRAR MODAL =====
        function showCloseModal() {
            document.getElementById('closeModal').classList.add('active');
        }

        // ===== CONFIRMAR CIERRE (CON LOGOUT FUNCIONAL) =====
        function confirmClose(closeSession) {
            document.getElementById('closeModal').classList.remove('active');
            if (closeSession) {
                if (window.netlifyIdentity && typeof window.netlifyIdentity.logout === 'function') {
                    console.log("🔐 Cerrando sesión en Netlify Identity...");
                    window.netlifyIdentity.logout();
                } else {
                    console.warn("⚠️ Netlify Identity no disponible. No se pudo cerrar sesión.");
                }
                window.location.href = '/';
            } else {
                window.location.href = '/';
            }
        }

        // ===== ABRIR PANEL =====
        function openAdminPanel() {
            document.getElementById('admin-panel').classList.add('active');
            document.body.style.overflow = 'hidden';
            loadAdminProducts();
        }

        // ===== INICIALIZAR =====
        $(document).ready(function() {
            if (window.netlifyIdentity) {
                window.netlifyIdentity.init();
            }
            $(document).on('keydown', function(e) {
                if (e.key === 'Escape') {
                    showCloseModal();
                }
            });
            $('#admin-panel').on('click', function(e) {
                if (e.target === this) {
                    showCloseModal();
                }
            });
            openAdminPanel();
        });
    </script>
</body>
</html>
