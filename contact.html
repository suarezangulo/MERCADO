<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CINEMARKET · Contacto</title>
    <meta name="description" content="Contáctanos por WhatsApp." />
    <link rel="icon" type="image/png" href="images/icons/favicon.png" />

    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="fonts/iconic/css/material-design-iconic-font.min.css" />
    <link rel="stylesheet" href="fonts/linearicons-v1.0.0/icon-font.min.css" />
    <link rel="stylesheet" href="vendor/animate/animate.css" />
    <link rel="stylesheet" href="vendor/css-hamburgers/hamburgers.min.css" />
    <link rel="stylesheet" href="vendor/animsition/css/animsition.min.css" />
    <link rel="stylesheet" href="vendor/select2/select2.min.css" />
    <link rel="stylesheet" href="vendor/perfect-scrollbar/perfect-scrollbar.css" />
    <link rel="stylesheet" href="css/util.css" />
    <link rel="stylesheet" href="css/main.css" />
</head>
<body class="animsition">

    <!-- ===== HEADER ===== -->
    <header class="header-main">
        <div class="topbar">
            <div class="container">
                <span class="topbar__text">🎬 Disfruta del mejor contenido audiovisual · Paga en CUP</span>
            </div>
        </div>
        <div class="navbar">
            <div class="container navbar__inner">
                <a href="./" class="logo">
                    <span class="logo__cine">CINE</span><span class="logo__market">MARKET</span>
                </a>
                <nav class="nav">
                    <a href="contact.html" class="nav__link nav__link--active">Contacto</a>
                    <a href="admin/login.html" class="nav__link nav__link--panel">
                        <i class="zmdi zmdi-settings"></i> Panel
                    </a>
                </nav>
                <div class="header-actions">
                    <div class="cart-icon" data-notify="0" id="cartIcon">
                        <i class="zmdi zmdi-shopping-cart"></i>
                    </div>
                    <button class="hamburger" id="hamburger" aria-label="Menú">
                        <span class="hamburger__line"></span>
                        <span class="hamburger__line"></span>
                        <span class="hamburger__line"></span>
                    </button>
                </div>
            </div>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="contact.html" class="mobile-menu__link">Contacto</a>
            <a href="admin/login.html" class="mobile-menu__link">
                <i class="zmdi zmdi-settings"></i> Panel
            </a>
        </div>
        <div class="search-modal" id="searchModal">
            <div class="search-modal__inner">
                <button class="search-modal__close" id="searchClose">&times;</button>
                <form action="./" class="search-form">
                    <input type="text" name="search" placeholder="Buscar título, actor, director..." />
                    <button type="submit"><i class="zmdi zmdi-search"></i></button>
                </form>
            </div>
        </div>
    </header>

    <!-- ===== BREADCRUMB ===== -->
    <div class="breadcrumb">
        <div class="container">
            <a href="./">Inicio</a>
            <span class="breadcrumb__sep">›</span>
            <span>Contacto</span>
        </div>
    </div>

    <!-- ===== CONTACT ===== -->
    <main class="main">
        <div class="container">
            <div class="contact">
                <h1 class="contact__title">Envíame un WhatsApp</h1>
                <form class="contact__form" id="contactForm">
                    <textarea class="contact__textarea" id="msgContact" placeholder="¿Cómo puedo ayudarte? (películas, series, precios...)" rows="6"></textarea>
                    <button type="submit" class="btn btn--primary btn--lg">Enviar mensaje</button>
                </form>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer__links">
                <a href="contact.html">Contacto</a>
                <span>|</span>
                <a href="admin/login.html">Panel</a>
            </div>
            <p class="footer__copy">&copy; 2025 CINEMARKET · Todos los derechos reservados</p>
            <div class="footer__qr">
                <span class="footer__qr-label">📱 Escanea para visitar la tienda</span>
                <img src="/MERCADO/images/qr/qr-tienda.png" alt="QR" class="footer__qr-img" />
            </div>
        </div>
    </footer>

    <button class="back-top" id="backTop"><i class="zmdi zmdi-chevron-up"></i></button>
    <div class="whatsapp-btn" id="whatsappBtn">
        <img src="images/icons/whatsapp_logo.png" alt="WhatsApp" />
    </div>

    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="vendor/animsition/js/animsition.min.js"></script>
    <script src="vendor/bootstrap/js/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.min.js"></script>
    <script src="vendor/select2/select2.min.js"></script>
    <script src="vendor/MagnificPopup/jquery.magnific-popup.min.js"></script>
    <script src="vendor/perfect-scrollbar/perfect-scrollbar.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('msgContact').value;
            if (!msg.trim()) return alert('Escribe un mensaje.');
            const url = 'https://wa.me/+' + contactCell + '?text=' + encodeURIComponent(msg);
            window.open(url);
        });
    </script>
</body>
</html>
