							<div class="bor8 m-b-30">
								<label for="msgContact" class="sr-only">Mensaje</label>
								<textarea id="msgContact" class="stext-111 cl2 plh3 size-120 p-lr-28 p-tb-25" name="msg" placeholder="¿Cómo le puedo ayudar? (consulta sobre películas, series, precios, etc.)"></textarea>

							<button type="submit" class="flex-c-m stext-101 cl0 size-121 bg3 bor1 hov-btn3 p-lr-15 trans-04 pointer" aria-label="Enviar mensaje por WhatsApp">Enviar</button>
